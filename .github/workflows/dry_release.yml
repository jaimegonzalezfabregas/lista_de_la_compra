name: "Flutter Analyze"

on:
  pull_request:
    branches:
      - master
      - develop

jobs:  
  build:      
    name: Build
    runs-on: ubuntu-latest 

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: flutterfiles/pubspec.yaml 

      - name: Install Dependencies
        run: cd flutterfiles &&  flutter pub get
   
      - name: Flutter Analyze
        run: cd flutterfiles && flutter analyze --no-fatal-infos --no-fatal-warnings